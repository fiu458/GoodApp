<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | GoodApp</title>
    <meta name="description" content="The GoodApp page you were looking for could not be found.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Sora:wght@600;700&display=swap" rel="stylesheet">
    <script>
        (() => {
            const isGitHubPages = window.location.hostname.endsWith("github.io");
            const isFile = window.location.protocol === "file:";
            const path = window.location.pathname;
            let assetBase = "";

            if (isGitHubPages) {
                assetBase = "/GoodApp/";
            } else if (!isFile) {
                assetBase = path.includes("/GoodAppWeb/") ? "/GoodAppWeb/" : "/";
            }

            window.goodAppAssetBase = assetBase;
            document.write(`<link rel="stylesheet" href="${assetBase}styles.css">`);
        })();
    </script>
    <noscript>
        <link rel="stylesheet" href="/GoodApp/styles.css">
    </noscript>
</head>
<body class="error-page">
    <div class="page-bg" aria-hidden="true"></div>

    <header class="site-header">
        <nav class="navbar container" aria-label="Main navigation">
            <a class="brand" href="https://fiu458.github.io/GoodApp/">GoodApp</a>
            <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="main-menu" aria-label="Toggle navigation">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <ul id="main-menu" class="nav-links">
                <li><a href="https://fiu458.github.io/GoodApp/#features">Features</a></li>
                <li><a href="https://fiu458.github.io/GoodApp/#how">How it works</a></li>
                <li><a href="https://fiu458.github.io/GoodApp/#download">Download</a></li>
                <li><a href="https://fiu458.github.io/GoodApp/#faq">FAQ</a></li>
            </ul>
        </nav>
    </header>

    <main id="top" class="error-main">
        <section class="hero error-hero container" aria-labelledby="error-title">
            <div class="hero-copy">
                <p class="eyebrow">404 error</p>
                <h1 id="error-title">Page not found.</h1>
                <p class="lead">
                    The shortcut you followed is invalid or outdated.
                </p>
                <div class="hero-actions">
                    <a class="btn btn-primary" href="https://fiu458.github.io/GoodApp/">Back to GoodApp</a>
                    <a class="btn btn-ghost" href="https://fiu458.github.io/GoodApp/#download">Download</a>
                </div>
            </div>
            <div class="hero-media">
                <div class="shot-card">
                    <img id="app-shot" src="GoodAppSrc.png" alt="GoodApp application screenshot">
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container footer-inner">
            <p>Contact: GoodAppOfficial@proton.me</p>
            <div class="social-links" aria-label="Social links">
                <a class="social-icon" href="https://discord.com/channels/1460212098024865815/1460261906983026975" target="_blank" rel="noopener noreferrer" aria-label="Discord">
                    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                        <path d="M20.32 4.37A19.8 19.8 0 0 0 15.4 3a13.7 13.7 0 0 0-.63 1.29A18.46 18.46 0 0 0 9.23 4.3 13.7 13.7 0 0 0 8.6 3a19.74 19.74 0 0 0-4.93 1.38C.56 9.08-.27 13.65.14 18.16a19.97 19.97 0 0 0 6.05 3.05c.49-.66.93-1.36 1.3-2.1-.71-.27-1.39-.61-2.03-1 .17-.13.34-.27.5-.41 3.92 1.83 8.18 1.83 12.05 0 .17.14.34.28.5.41-.64.39-1.32.73-2.04 1 .38.74.82 1.44 1.31 2.1a19.93 19.93 0 0 0 6.05-3.05c.48-5.23-.82-9.76-3.51-13.79ZM8.03 15.41c-1.18 0-2.14-1.08-2.14-2.4 0-1.33.95-2.4 2.14-2.4 1.2 0 2.15 1.08 2.14 2.4 0 1.32-.95 2.4-2.14 2.4Zm7.94 0c-1.18 0-2.14-1.08-2.14-2.4 0-1.33.95-2.4 2.14-2.4 1.2 0 2.15 1.08 2.14 2.4 0 1.32-.95 2.4-2.14 2.4Z"></path>
                    </svg>
                    <span class="sr-only">Discord</span>
                </a>
                <a class="social-icon" href="https://www.tiktok.com/@goodappofficial" target="_blank" rel="noopener noreferrer" aria-label="TikTok">
                    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                        <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.08V2h-3.3v13.2a2.74 2.74 0 1 1-2.74-2.74c.22 0 .44.03.64.08V9.19a6.07 6.07 0 0 0-.64-.03A6.04 6.04 0 1 0 15.82 15V8.2a8.08 8.08 0 0 0 4.72 1.52V6.69h-.95Z"></path>

                </a>
            </div>
            <p>&copy; <span id="year">2026</span> GoodApp</p>
        </div>
    </footer>

    <script>
        (() => {
            const assetBase = window.goodAppAssetBase || "";
            const appShot = document.getElementById("app-shot");
            const yearEl = document.getElementById("year");
            const menuButton = document.querySelector(".menu-toggle");
            const navLinks = document.querySelector(".nav-links");

            if (appShot) {
                appShot.src = `${assetBase}GoodAppSrc.png`;
            }

            if (yearEl) {
                yearEl.textContent = new Date().getFullYear();
            }

            if (menuButton && navLinks) {
                menuButton.addEventListener("click", () => {
                    const expanded = menuButton.getAttribute("aria-expanded") === "true";
                    menuButton.setAttribute("aria-expanded", String(!expanded));
                    navLinks.classList.toggle("open");
                });

                navLinks.querySelectorAll("a").forEach((link) => {
                    link.addEventListener("click", () => {
                        menuButton.setAttribute("aria-expanded", "false");
                        navLinks.classList.remove("open");
                    });
                });

                document.addEventListener("click", (event) => {
                    if (!navLinks.contains(event.target) && !menuButton.contains(event.target)) {
                        menuButton.setAttribute("aria-expanded", "false");
                        navLinks.classList.remove("open");
                    }
                });
            }
        })();
    </script>
</body>
</html>
